<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waysorted Public Stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
      .stats-hero {
        margin: 0 0 20px;
      }
      .stats-hero h1 {
        margin-bottom: 10px;
      }
      .segmented-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .segment {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(13, 22, 44, 0.8);
      }
      .segment button {
        border: none;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
      .segment button.active {
        color: #f5f8ff;
        background: linear-gradient(145deg, rgba(93, 155, 255, 0.9), rgba(79, 128, 255, 0.92));
      }
      .metric-tabs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }
      .metric-tab {
        text-align: left;
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        background: linear-gradient(160deg, rgba(15, 28, 54, 0.96), rgba(17, 31, 59, 0.95));
        color: var(--text);
        padding: 14px;
        cursor: pointer;
      }
      .metric-tab.active {
        border-color: rgba(93, 155, 255, 0.5);
        box-shadow: 0 10px 24px rgba(54, 104, 255, 0.18);
      }
      .metric-tab-value {
        display: block;
        margin-top: 8px;
        font-size: 28px;
        font-weight: 700;
      }
      .metric-tab-delta {
        display: inline-flex;
        margin-top: 10px;
      }
      .chart-wrap-lg {
        height: clamp(320px, 46vh, 460px);
      }
      @media (max-width: 720px) {
        .segment {
          width: 100%;
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <div>
        <p class="eyebrow">Public Dashboard</p>
        <h1>Waysorted Plugin Stats</h1>
        <p class="subtitle">
          Fig-stats style public metrics for MAU, likes, saves, follows, auths, and reuse signals.
        </p>
      </div>
      <div class="header-actions">
        <nav class="top-nav" aria-label="Main Navigation">
          <a class="nav-link" href="/">Overview</a>
          <a class="nav-link" href="/features.html">Feature Intelligence</a>
          <a class="nav-link" href="/heatmap.html">Heatmap Lab</a>
          <a class="nav-link" href="/credits.html">Credit Intelligence</a>
          <a class="nav-link active" href="/stats.html" aria-current="page">Public Stats</a>
        </nav>
        <button id="refreshBtn" class="primary-btn" type="button">Refresh</button>
      </div>
    </header>

    <section class="stats-hero">
      <div id="statsHighlights" class="kpi-grid"></div>
    </section>

    <section class="card stats-meta-card">
      <div id="statsMeta" class="source-strip"></div>
      <div id="inactiveMetrics" class="status" hidden></div>
    </section>

    <div class="segmented-controls">
      <div id="rangeGroup" class="segment" role="group" aria-label="Range">
        <button class="active" data-range="7d" type="button">7d</button>
        <button data-range="30d" type="button">30d</button>
        <button data-range="90d" type="button">3m</button>
        <button data-range="180d" type="button">6m</button>
        <button data-range="365d" type="button">12m</button>
        <button data-range="all" type="button">All</button>
      </div>
      <div id="modeGroup" class="segment" role="group" aria-label="Mode">
        <button class="active" data-mode="linear" type="button">Linear</button>
        <button data-mode="cumulative" type="button">Cumulative</button>
      </div>
    </div>

    <section id="metricTabs" class="metric-tabs" role="tablist" aria-label="Metric Selection"></section>

    <section class="card">
      <div class="chart-wrap chart-wrap-lg">
        <canvas id="statsChart"></canvas>
      </div>
    </section>

    <section class="card">
      <h2>Historical Snapshots</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">MAU</th>
              <th scope="col">Auths</th>
              <th scope="col">Likes</th>
              <th scope="col">Saves</th>
              <th scope="col">Follows</th>
              <th scope="col">Reused</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>

    <p id="statusLine" class="status">Loading stats…</p>

    <script type="module" src="/stats.js"></script>
  </body>
</html>
