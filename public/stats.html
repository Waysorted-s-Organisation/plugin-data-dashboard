<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waysorted Plugin Stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .stats-header {
        text-align: center;
        margin: 40px 0;
      }
      .stats-header h1 {
        font-size: 56px;
        margin-bottom: 16px;
      }
      .stats-header .subtitle {
        margin: 0 auto;
        font-size: 18px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
      .stat-card {
        background: linear-gradient(155deg, rgba(20, 35, 68, 0.9), rgba(12, 23, 46, 0.95));
        border: 1px solid rgba(129, 167, 255, 0.2);
        border-radius: 20px;
        padding: 30px 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
      .stat-card .value {
        font-size: 48px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 10px;
      }
      .stat-card .label {
        font-size: 14px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .actions-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 40px;
      }
      .action-btn {
        background: rgba(13, 22, 44, 0.8);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: all 200ms ease;
      }
      .action-btn:hover {
        background: rgba(106, 146, 255, 0.14);
        border-color: rgba(111, 164, 255, 0.8);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <header class="page-header" style="justify-content: flex-end;">
      <div class="header-actions">
        <nav class="top-nav">
          <a class="nav-link" href="/">Overview</a>
          <a class="nav-link" href="/features.html">Feature Intelligence</a>
          <a class="nav-link" href="/heatmap.html">Heatmap Lab</a>
          <a class="nav-link" href="/credits.html">Credit Consumption</a>
          <a class="nav-link active" href="/stats.html">Public Stats</a>
        </nav>
      </div>
    </header>

    <div class="stats-header">
      <p class="eyebrow">Public Dashboard</p>
      <h1>Waysorted Plugin</h1>
      <p class="subtitle">Live statistics and community engagement.</p>
    </div>

    <div class="actions-row">
      <button class="action-btn" data-action="like">❤️ Like Plugin</button>
      <button class="action-btn" data-action="save">⭐ Save</button>
      <button class="action-btn" data-action="follow">➕ Follow</button>
    </div>

    <section class="stats-grid" id="statsGrid">
      <!-- Injected by stats.js -->
    </section>

    <p id="statusLine" class="status" style="text-align: center;">Loading stats…</p>

    <script type="module" src="/stats.js"></script>
  </body>
</html>
